name: PR Preview Prepare

# Unprivileged job: runs with read-only access and simply packages the PR
# content as an artifact for the privileged deploy job to consume.
on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR content
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Save PR metadata
        env:
          PR_NUMBER: ${{ github.event.number }}
          PR_ACTION: ${{ github.event.action }}
        run: |
          printf '%s' "$PR_NUMBER" > .pr-number
          printf '%s' "$PR_ACTION" > .pr-action

      - name: Upload PR content as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview
          path: .
          retention-days: 1
